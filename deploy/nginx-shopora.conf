# Reverse proxy HTTPS per il backend Shopora
# Posizione sul server: /etc/nginx/sites-available/shopora
# Sostituire api.TUODOMINIO.it con il dominio reale in TUTTO il file.
#
# Il backend Node resta su 127.0.0.1:3000 (PM2): da fuori si passa solo da nginx.

server {
    listen 80;
    listen [::]:80;
    server_name api.TUODOMINIO.it;

    # Challenge Let's Encrypt (certbot la usa per il rinnovo)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tutto il resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.TUODOMINIO.it;

    # Certificati (percorsi creati da certbot al primo rilascio)
    ssl_certificate     /etc/letsencrypt/live/api.TUODOMINIO.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.TUODOMINIO.it/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Upload scontrini/volantini: le foto possono superare il default di 1 MB
    client_max_body_size 25m;

    # Timeout generosi: l'OCR può impiegare 60-90 secondi
    proxy_read_timeout  180s;
    proxy_send_timeout  180s;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (se mai servisse)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
